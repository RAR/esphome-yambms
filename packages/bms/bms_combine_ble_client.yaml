# +--------------------------------------+
# | Sensors                              |
# +--------------------------------------+

  # total_voltage (received as mV, converted to V)
  - platform: ble_client
    ble_client_id: ble_client${bms_id}
    id: bms${bms_id}_total_voltage
    device_id: bms_${bms_id}
    name: "Total Voltage"
    type: characteristic
    service_uuid: ${ble_service_uuid}
    characteristic_uuid: "beb5483e-36e1-4688-b7f5-ea07361b2605"
    notify: true
    accuracy_decimals: 2
    unit_of_measurement: V
    device_class: voltage
    lambda: |-
      if (!id(bms${bms_id}_online_status).state) return 0.0f;
      if (x.size() >= 4) {
        uint32_t val = x[0] | (x[1] << 8) | (x[2] << 16) | (x[3] << 24);
        return val * 0.001f;
      }
      return 0.0f;
    filters:
      - or:
        - throttle: 10s
        - delta: 0.01

  # current (received as mA, converted to A, signed)
