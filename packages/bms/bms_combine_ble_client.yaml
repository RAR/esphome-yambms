# +--------------------------------------+
# | BLE Client Configuration             |
# +--------------------------------------+
# This file configures a BLE GATT client to read BMS data
# from a BLE server as an alternative to Modbus communication.
#
# Required substitutions:
#   bms_id: The BMS ID number
#   bms_name: The BMS name
#   bms_ble_mac_address: MAC address of the BLE server
#   ble_service_uuid: The service UUID (must match server)
#   yambms_id: The YamBMS ID
#   yambms_update_interval: Update interval for combining

substitutions:
  bms_model: "YamBMS"
  bms_protocol: "BLE"
  # YamBMS BMS Service UUID (must match server)
  ble_service_uuid: "4fafc201-1fb5-459e-8fcc-c5c9c331914b"

packages:
  sub_device: !include bms_base_sub_device.yaml
  bms_balancer: !include bms_base_balancer.yaml
  bms_combine: !include bms_combine.yaml

# +--------------------------------------+
# | ESP32 BLE Tracker                    |
# +--------------------------------------+
# Required for BLE client functionality

esp32_ble_tracker:
  scan_parameters:
    interval: 1100ms
    window: 1100ms
    active: true

# +--------------------------------------+
# | BLE Client Configuration             |
# +--------------------------------------+

ble_client:
  - mac_address: ${bms_ble_mac_address}
    id: ble_client${bms_id}
    auto_connect: true
    on_connect:
      then:
        - logger.log: "BMS ${bms_id} BLE server connected!"
        - lambda: |-
            id(bms${bms_id}_ble_connected) = true;
    on_disconnect:
      then:
        - logger.log: "BMS ${bms_id} BLE server disconnected!"
        - lambda: |-
            id(bms${bms_id}_ble_connected) = false;
            id(bms${bms_id}_online_status).publish_state(false);
            id(bms${bms_id}_charging_allowed).publish_state(false);
            id(bms${bms_id}_discharging_allowed).publish_state(false);
            id(bms${bms_id}_bms_equalizing).publish_state(false);
            id(bms${bms_id}_total_voltage).publish_state(0);
            id(bms${bms_id}_current).publish_state(0);
            id(bms${bms_id}_power).publish_state(0);
            id(bms${bms_id}_battery_soc).publish_state(0);
            id(bms${bms_id}_battery_capacity).publish_state(0);
            id(bms${bms_id}_battery_capacity_remaining).publish_state(0);
            id(bms${bms_id}_charging_cycles).publish_state(0);
            id(bms${bms_id}_max_charge_current).publish_state(0);
            id(bms${bms_id}_max_discharge_current).publish_state(0);
            id(bms${bms_id}_max_cell_voltage).publish_state(0);
            id(bms${bms_id}_max_voltage_cell).publish_state(0);
            id(bms${bms_id}_min_cell_voltage).publish_state(0);
            id(bms${bms_id}_min_voltage_cell).publish_state(0);
            id(bms${bms_id}_min_temperature).publish_state(0);
            id(bms${bms_id}_min_temperature_sensor).publish_state(0);
            id(bms${bms_id}_max_temperature).publish_state(0);
            id(bms${bms_id}_max_temperature_sensor).publish_state(0);
            id(bms${bms_id}_cell_ovp).publish_state(0);
            id(bms${bms_id}_cell_uvp).publish_state(0);
            id(bms${bms_id}_bms_balance_trigger_voltage).publish_state(0);
            id(bms${bms_id}_yambms_errors_bitmask).publish_state(0);
            id(bms${bms_id}_charging_power).publish_state(0);
            id(bms${bms_id}_discharging_power).publish_state(0);
            id(bms${bms_id}_battery_soh).publish_state(0);

# +--------------------------------------+
# | Globals                              |
# +--------------------------------------+

globals:
  - id: bms${bms_id}_ble_connected
    type: bool
    restore_value: no
    initial_value: "false"

# +--------------------------------------+
# | Binary Sensors (Template-based)      |
# +--------------------------------------+
# Binary sensors are updated via sensors with on_value triggers

binary_sensor:
  # online_status
  - platform: template
    id: bms${bms_id}_online_status
    device_id: bms_${bms_id}
    name: "Online status"

  # charging_allowed
  - platform: template
    id: bms${bms_id}_charging_allowed
    device_id: bms_${bms_id}
    name: "Charging allowed"

  # discharging_allowed
  - platform: template
    id: bms${bms_id}_discharging_allowed
    device_id: bms_${bms_id}
    name: "Discharging allowed"

  # equalizing
  - platform: template
    id: bms${bms_id}_bms_equalizing
    device_id: bms_${bms_id}
    name: "balancing"
    internal: true

# +--------------------------------------+
# | Sensors for Binary State (hidden)    |
# +--------------------------------------+
# These sensors read BLE characteristics and update binary sensors

sensor:
  # online_status reader
  - platform: ble_client
    ble_client_id: ble_client${bms_id}
    id: bms${bms_id}_ble_online_status_reader
    internal: true
    type: characteristic
    service_uuid: ${ble_service_uuid}
    characteristic_uuid: "beb5483e-36e1-4688-b7f5-ea07361b2601"
    notify: true
    lambda: |-
      if (x.size() >= 1) return static_cast<float>(x[0]);
      return 0.0f;
    on_value:
      then:
        - lambda: |-
            id(bms${bms_id}_online_status).publish_state(x > 0);

  # charging_allowed reader
  - platform: ble_client
    ble_client_id: ble_client${bms_id}
    id: bms${bms_id}_ble_charging_allowed_reader
    internal: true
    type: characteristic
    service_uuid: ${ble_service_uuid}
    characteristic_uuid: "beb5483e-36e1-4688-b7f5-ea07361b2602"
    notify: true
    lambda: |-
      if (x.size() >= 1) return static_cast<float>(x[0]);
      return 0.0f;
    on_value:
      then:
        - lambda: |-
            if (!id(bms${bms_id}_online_status).state) {
              id(bms${bms_id}_charging_allowed).publish_state(false);
            } else {
              id(bms${bms_id}_charging_allowed).publish_state(x > 0);
            }

  # discharging_allowed reader
  - platform: ble_client
    ble_client_id: ble_client${bms_id}
    id: bms${bms_id}_ble_discharging_allowed_reader
    internal: true
    type: characteristic
    service_uuid: ${ble_service_uuid}
    characteristic_uuid: "beb5483e-36e1-4688-b7f5-ea07361b2603"
    notify: true
    lambda: |-
      if (x.size() >= 1) return static_cast<float>(x[0]);
