        # Cell UVP (2 bytes: uint16_t in mV)
        - id: bms${bms_id}_ble_cell_uvp
          uuid: "beb5483e-36e1-4688-b7f5-ea07361b2617"
          description: "Cell UVP mV"
          read: true
          notify: true
          value:
            data: !lambda |-
              float state = id(bms${bms_id}_cell_uvp).state;
              uint16_t val = std::isnan(state) ? 0 : static_cast<uint16_t>(state * 1000);
              return std::vector<uint8_t>{
                static_cast<uint8_t>(val & 0xFF),
                static_cast<uint8_t>((val >> 8) & 0xFF)
              };

        # Balance Trigger Voltage (2 bytes: uint16_t in mV)
        - id: bms${bms_id}_ble_balance_trigger_voltage
          uuid: "beb5483e-36e1-4688-b7f5-ea07361b2618"
          description: "Balance Trigger Voltage mV"
          read: true
          notify: true
          value:
            data: !lambda |-
              float state = id(bms${bms_id}_balance_trigger_voltage).state;
              uint16_t val = std::isnan(state) ? 0 : static_cast<uint16_t>(state * 1000);
              return std::vector<uint8_t>{
                static_cast<uint8_t>(val & 0xFF),
                static_cast<uint8_t>((val >> 8) & 0xFF)
              };

# +--------------------------------------+
# | Interval to trigger notifications    |
# +--------------------------------------+
# Notifications are grouped by service for better organization

interval:
  # Status Service notifications
  - interval: ${ble_notify_interval}
    then:
      - logger.log:
          level: INFO
          format: "BLE Server: Sending Status notifications (online=%d)"
          args: ['id(bms${bms_id}_online_status).state']
      - ble_server.characteristic.notify:
          id: bms${bms_id}_ble_online_status
      - ble_server.characteristic.notify:
          id: bms${bms_id}_ble_charging_allowed
      - ble_server.characteristic.notify:
          id: bms${bms_id}_ble_discharging_allowed
      - ble_server.characteristic.notify:
          id: bms${bms_id}_ble_equalizing
      - ble_server.characteristic.notify:
          id: bms${bms_id}_ble_errors_bitmask

  # Battery Service notifications
  - interval: ${ble_notify_interval}
    then:
      - logger.log:
          level: INFO
          format: "BLE Server: Sending Battery notifications (voltage=%.2fV)"
          args: ['id(bms${bms_id}_total_voltage).state']
      - ble_server.characteristic.notify:
          id: bms${bms_id}_ble_total_voltage
      - ble_server.characteristic.notify:
          id: bms${bms_id}_ble_current
      - ble_server.characteristic.notify:
          id: bms${bms_id}_ble_power
      - ble_server.characteristic.notify:
          id: bms${bms_id}_ble_battery_soc
      - ble_server.characteristic.notify:
          id: bms${bms_id}_ble_battery_soh
      - ble_server.characteristic.notify:
          id: bms${bms_id}_ble_battery_capacity
      - ble_server.characteristic.notify:
          id: bms${bms_id}_ble_battery_capacity_remaining
      - ble_server.characteristic.notify:
          id: bms${bms_id}_ble_charging_cycles
      - ble_server.characteristic.notify:
          id: bms${bms_id}_ble_charging_power
      - ble_server.characteristic.notify:
          id: bms${bms_id}_ble_discharging_power

  # Cell Voltage Service notifications
  - interval: ${ble_notify_interval}
    then:
      - ble_server.characteristic.notify:
          id: bms${bms_id}_ble_max_cell_voltage
      - ble_server.characteristic.notify:
          id: bms${bms_id}_ble_max_voltage_cell
      - ble_server.characteristic.notify:
          id: bms${bms_id}_ble_min_cell_voltage
      - ble_server.characteristic.notify:
          id: bms${bms_id}_ble_min_voltage_cell

  # Temperature Service notifications
  - interval: ${ble_notify_interval}
    then:
      - ble_server.characteristic.notify:
          id: bms${bms_id}_ble_min_temperature
      - ble_server.characteristic.notify:
          id: bms${bms_id}_ble_min_temperature_sensor
      - ble_server.characteristic.notify:
          id: bms${bms_id}_ble_max_temperature
      - ble_server.characteristic.notify:
          id: bms${bms_id}_ble_max_temperature_sensor

  # Limits Service notifications
  - interval: ${ble_notify_interval}
    then:
      - ble_server.characteristic.notify:
          id: bms${bms_id}_ble_max_charge_current
      - ble_server.characteristic.notify:
          id: bms${bms_id}_ble_max_discharge_current
      - ble_server.characteristic.notify:
          id: bms${bms_id}_ble_cell_ovp
      - ble_server.characteristic.notify:
          id: bms${bms_id}_ble_cell_uvp
      - ble_server.characteristic.notify:
