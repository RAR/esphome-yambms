              };

        # Min Cell Voltage (2 bytes: uint16_t in mV)
        - id: bms${bms_id}_ble_min_cell_voltage
          uuid: "beb5483e-36e1-4688-b7f5-ea07361b2610"
          description: "Min Cell Voltage mV"
          read: true
          notify: true
          value:
            data: !lambda |-
              float state = id(bms${bms_id}_min_cell_voltage).state;
              uint16_t val = std::isnan(state) ? 0 : static_cast<uint16_t>(state * 1000);
              return std::vector<uint8_t>{
                static_cast<uint8_t>(val & 0xFF),
                static_cast<uint8_t>((val >> 8) & 0xFF)
              };

        # Min Voltage Cell Number (2 bytes: uint16_t)
        - id: bms${bms_id}_ble_min_voltage_cell
          uuid: "beb5483e-36e1-4688-b7f5-ea07361b2611"
          description: "Min Voltage Cell"
          read: true
          notify: true
          value:
            data: !lambda |-
              float state = id(bms${bms_id}_min_voltage_cell).state;
              uint16_t val = std::isnan(state) ? 0 : static_cast<uint16_t>(state);
              return std::vector<uint8_t>{
                static_cast<uint8_t>(val & 0xFF),
                static_cast<uint8_t>((val >> 8) & 0xFF)
              };

    # ==========================================
    # SERVICE 4: TEMPERATURE SERVICE
    # ==========================================
    - uuid: ${ble_svc_temp_uuid}
      advertise: false
      characteristics:
        # Min Temperature (2 bytes: int16_t in 0.1°C, signed)
        - id: bms${bms_id}_ble_min_temperature
          uuid: "beb5483e-36e1-4688-b7f5-ea07361b2612"
          description: "Min Temperature 0.1C"
          read: true
          notify: true
          value:
            data: !lambda |-
              float state = id(bms${bms_id}_min_temperature).state;
              int16_t val = std::isnan(state) ? -2730 : static_cast<int16_t>(state * 10);
              return std::vector<uint8_t>{
                static_cast<uint8_t>(val & 0xFF),
                static_cast<uint8_t>((val >> 8) & 0xFF)
              };

        # Min Temperature Sensor Number (2 bytes: uint16_t)
        - id: bms${bms_id}_ble_min_temperature_sensor
          uuid: "beb5483e-36e1-4688-b7f5-ea07361b2613"
          description: "Min Temperature Sensor"
          read: true
          notify: true
          value:
            data: !lambda |-
              float state = id(bms${bms_id}_min_temperature_sensor).state;
              uint16_t val = std::isnan(state) ? 0 : static_cast<uint16_t>(state);
              return std::vector<uint8_t>{
                static_cast<uint8_t>(val & 0xFF),
                static_cast<uint8_t>((val >> 8) & 0xFF)
              };

        # Max Temperature (2 bytes: int16_t in 0.1°C, signed)
        - id: bms${bms_id}_ble_max_temperature
          uuid: "beb5483e-36e1-4688-b7f5-ea07361b2614"
          description: "Max Temperature 0.1C"
          read: true
          notify: true
          value:
            data: !lambda |-
              float state = id(bms${bms_id}_max_temperature).state;
              int16_t val = std::isnan(state) ? -2730 : static_cast<int16_t>(state * 10);
              return std::vector<uint8_t>{
                static_cast<uint8_t>(val & 0xFF),
