# +--------------------------------------+
# | BLE Server Configuration             |
# +--------------------------------------+
# This file configures a BLE GATT server to expose BMS data
# as an alternative to Modbus communication.
#
# Services are organized by purpose:
#   1. Status Service    - Online, charging/discharging allowed, equalizing, errors
#   2. Battery Service   - Voltage, current, power, SoC, SoH, capacity, cycles
#   3. Cell Service      - Min/max cell voltage and cell numbers
#   4. Temperature Service - Min/max temperature and sensor numbers
#   5. Limits Service    - Charge/discharge limits, OVP/UVP, balance trigger
#
# Required substitutions:
#   bms_id: The BMS ID number
#   ble_notify_interval: Interval for notify updates (default: 1s)

substitutions:
  # Service UUIDs - each service has a unique UUID
  ble_svc_status_uuid: "4fafc201-1fb5-459e-8fcc-c5c9c331914b"
  ble_svc_battery_uuid: "4fafc202-1fb5-459e-8fcc-c5c9c331914b"
  ble_svc_cell_uuid: "4fafc203-1fb5-459e-8fcc-c5c9c331914b"
  ble_svc_temp_uuid: "4fafc204-1fb5-459e-8fcc-c5c9c331914b"
  ble_svc_limits_uuid: "4fafc205-1fb5-459e-8fcc-c5c9c331914b"
  ble_notify_interval: "1s"

esp32_ble_server:
  manufacturer: "YamBMS"
  model: "BMS ${bms_id}"
  services:
    # ==========================================
    # SERVICE 1: STATUS SERVICE
    # ==========================================
    - uuid: ${ble_svc_status_uuid}
      advertise: true
      characteristics:
        # Online Status (1 byte: 0/1)
        - id: bms${bms_id}_ble_online_status
          uuid: "beb5483e-36e1-4688-b7f5-ea07361b2601"
          description: "Online Status"
          read: true
          notify: true
          value:
            data: !lambda |-
              return std::vector<uint8_t>{static_cast<uint8_t>(id(bms${bms_id}_online_status).state ? 1 : 0)};

        # Charging Allowed (1 byte: 0/1)
        - id: bms${bms_id}_ble_charging_allowed
          uuid: "beb5483e-36e1-4688-b7f5-ea07361b2602"
          description: "Charging Allowed"
          read: true
          notify: true
          value:
            data: !lambda |-
              return std::vector<uint8_t>{static_cast<uint8_t>(id(bms${bms_id}_charging_allowed).state ? 1 : 0)};

        # Discharging Allowed (1 byte: 0/1)
        - id: bms${bms_id}_ble_discharging_allowed
          uuid: "beb5483e-36e1-4688-b7f5-ea07361b2603"
          description: "Discharging Allowed"
          read: true
          notify: true
          value:
            data: !lambda |-
              return std::vector<uint8_t>{static_cast<uint8_t>(id(bms${bms_id}_discharging_allowed).state ? 1 : 0)};

        # Equalizing/Balancing (1 byte: 0/1)
        - id: bms${bms_id}_ble_equalizing
          uuid: "beb5483e-36e1-4688-b7f5-ea07361b2604"
          description: "Equalizing"
          read: true
          notify: true
          value:
            data: !lambda |-
              return std::vector<uint8_t>{static_cast<uint8_t>(id(bms${bms_id}_equalizing).state ? 1 : 0)};

        # Errors Bitmask (2 bytes: uint16_t)
        - id: bms${bms_id}_ble_errors_bitmask
          uuid: "beb5483e-36e1-4688-b7f5-ea07361b2619"
          description: "Errors Bitmask"
          read: true
          notify: true
          value:
            data: !lambda |-
              float state = id(bms${bms_id}_yambms_errors_bitmask).state;
              uint16_t val = std::isnan(state) ? 0 : static_cast<uint16_t>(state);
              return std::vector<uint8_t>{
                static_cast<uint8_t>(val & 0xFF),
                static_cast<uint8_t>((val >> 8) & 0xFF)
              };

    # ==========================================
    # SERVICE 2: BATTERY SERVICE
    # ==========================================
    - uuid: ${ble_svc_battery_uuid}
      advertise: false
      characteristics:
        # Total Voltage (4 bytes: uint32_t in mV)
        - id: bms${bms_id}_ble_total_voltage
          uuid: "beb5483e-36e1-4688-b7f5-ea07361b2605"
          description: "Total Voltage mV"
          read: true
          notify: true
          value:
            data: !lambda |-
              float state = id(bms${bms_id}_total_voltage).state;
              uint32_t val = std::isnan(state) ? 0 : static_cast<uint32_t>(state * 1000);
              return std::vector<uint8_t>{
                static_cast<uint8_t>(val & 0xFF),
                static_cast<uint8_t>((val >> 8) & 0xFF),
                static_cast<uint8_t>((val >> 16) & 0xFF),
                static_cast<uint8_t>((val >> 24) & 0xFF)
              };

        # Current (4 bytes: int32_t in mA, signed)
        - id: bms${bms_id}_ble_current
          uuid: "beb5483e-36e1-4688-b7f5-ea07361b2606"
          description: "Current mA"
          read: true
          notify: true
          value:
            data: !lambda |-
              float state = id(bms${bms_id}_current).state;
              int32_t val = std::isnan(state) ? 0 : static_cast<int32_t>(state * 1000);
              return std::vector<uint8_t>{
                static_cast<uint8_t>(val & 0xFF),
                static_cast<uint8_t>((val >> 8) & 0xFF),
                static_cast<uint8_t>((val >> 16) & 0xFF),
                static_cast<uint8_t>((val >> 24) & 0xFF)
              };

        # Power (4 bytes: int32_t in mW, signed)
        - id: bms${bms_id}_ble_power
          uuid: "beb5483e-36e1-4688-b7f5-ea07361b2607"
          description: "Power mW"
          read: true
          notify: true
          value:
            data: !lambda |-
              float state = id(bms${bms_id}_power).state;
              int32_t val = std::isnan(state) ? 0 : static_cast<int32_t>(state * 1000);
              return std::vector<uint8_t>{
                static_cast<uint8_t>(val & 0xFF),
                static_cast<uint8_t>((val >> 8) & 0xFF),
                static_cast<uint8_t>((val >> 16) & 0xFF),
                static_cast<uint8_t>((val >> 24) & 0xFF)
              };

        # Battery SoC (2 bytes: uint16_t in %)
        - id: bms${bms_id}_ble_battery_soc
          uuid: "beb5483e-36e1-4688-b7f5-ea07361b2608"
          description: "Battery SoC %"
          read: true
          notify: true
          value:
            data: !lambda |-
              float state = id(bms${bms_id}_battery_soc).state;
              uint16_t val = std::isnan(state) ? 0 : static_cast<uint16_t>(state);
              return std::vector<uint8_t>{
                static_cast<uint8_t>(val & 0xFF),
                static_cast<uint8_t>((val >> 8) & 0xFF)
              };

        # Battery SoH (2 bytes: uint16_t in %)
        - id: bms${bms_id}_ble_battery_soh
          uuid: "beb5483e-36e1-4688-b7f5-ea07361b261c"
          description: "Battery SoH %"
          read: true
          notify: true
          value:
            data: !lambda |-
              float state = id(bms${bms_id}_battery_soh).state;
              uint16_t val = std::isnan(state) ? 0 : static_cast<uint16_t>(state);
              return std::vector<uint8_t>{
                static_cast<uint8_t>(val & 0xFF),
                static_cast<uint8_t>((val >> 8) & 0xFF)
              };

        # Battery Capacity (2 bytes: uint16_t in Ah)
        - id: bms${bms_id}_ble_battery_capacity
          uuid: "beb5483e-36e1-4688-b7f5-ea07361b2609"
          description: "Battery Capacity Ah"
          read: true
          notify: true
          value:
            data: !lambda |-
              float state = id(bms${bms_id}_battery_capacity).state;
              uint16_t val = std::isnan(state) ? 0 : static_cast<uint16_t>(state);
              return std::vector<uint8_t>{
                static_cast<uint8_t>(val & 0xFF),
                static_cast<uint8_t>((val >> 8) & 0xFF)
              };

        # Battery Capacity Remaining (2 bytes: uint16_t in Ah)
        - id: bms${bms_id}_ble_battery_capacity_remaining
          uuid: "beb5483e-36e1-4688-b7f5-ea07361b260a"
          description: "Battery Capacity Remaining Ah"
          read: true
          notify: true
          value:
            data: !lambda |-
              float state = id(bms${bms_id}_battery_capacity_remaining).state;
              uint16_t val = std::isnan(state) ? 0 : static_cast<uint16_t>(state);
              return std::vector<uint8_t>{
                static_cast<uint8_t>(val & 0xFF),
                static_cast<uint8_t>((val >> 8) & 0xFF)
              };

        # Charging Cycles (2 bytes: uint16_t)
        - id: bms${bms_id}_ble_charging_cycles
          uuid: "beb5483e-36e1-4688-b7f5-ea07361b260b"
          description: "Charging Cycles"
          read: true
          notify: true
          value:
            data: !lambda |-
              float state = id(bms${bms_id}_charging_cycles).state;
              uint16_t val = std::isnan(state) ? 0 : static_cast<uint16_t>(state);
              return std::vector<uint8_t>{
                static_cast<uint8_t>(val & 0xFF),
                static_cast<uint8_t>((val >> 8) & 0xFF)
              };

        # Charging Power (4 bytes: uint32_t in mW)
        - id: bms${bms_id}_ble_charging_power
          uuid: "beb5483e-36e1-4688-b7f5-ea07361b261a"
          description: "Charging Power mW"
          read: true
          notify: true
          value:
            data: !lambda |-
              float state = id(bms${bms_id}_charging_power).state;
              uint32_t val = std::isnan(state) ? 0 : static_cast<uint32_t>(state * 1000);
              return std::vector<uint8_t>{
                static_cast<uint8_t>(val & 0xFF),
                static_cast<uint8_t>((val >> 8) & 0xFF),
                static_cast<uint8_t>((val >> 16) & 0xFF),
                static_cast<uint8_t>((val >> 24) & 0xFF)
              };

        # Discharging Power (4 bytes: uint32_t in mW)
        - id: bms${bms_id}_ble_discharging_power
          uuid: "beb5483e-36e1-4688-b7f5-ea07361b261b"
          description: "Discharging Power mW"
          read: true
          notify: true
          value:
            data: !lambda |-
              float state = id(bms${bms_id}_discharging_power).state;
              uint32_t val = std::isnan(state) ? 0 : static_cast<uint32_t>(state * 1000);
              return std::vector<uint8_t>{
                static_cast<uint8_t>(val & 0xFF),
                static_cast<uint8_t>((val >> 8) & 0xFF),
                static_cast<uint8_t>((val >> 16) & 0xFF),
                static_cast<uint8_t>((val >> 24) & 0xFF)
              };

    # ==========================================
    # SERVICE 3: CELL VOLTAGE SERVICE
    # ==========================================
    - uuid: ${ble_svc_cell_uuid}
      advertise: false
      characteristics:
        # Max Cell Voltage (2 bytes: uint16_t in mV)
        - id: bms${bms_id}_ble_max_cell_voltage
          uuid: "beb5483e-36e1-4688-b7f5-ea07361b260e"
