                static_cast<uint8_t>((val >> 8) & 0xFF)
              };

    # ==========================================
    # SERVICE 5: LIMITS SERVICE
    # ==========================================
    - uuid: ${ble_svc_limits_uuid}
      advertise: false
      characteristics:
        # Max Charge Current (2 bytes: uint16_t in A)
        - id: bms${bms_id}_ble_max_charge_current
          uuid: "beb5483e-36e1-4688-b7f5-ea07361b260c"
          description: "Max Charge Current A"
          read: true
          notify: true
          value:
            data: !lambda |-
              float state = id(bms${bms_id}_max_charge_current).state;
              uint16_t val = std::isnan(state) ? 0 : static_cast<uint16_t>(state);
              return std::vector<uint8_t>{
                static_cast<uint8_t>(val & 0xFF),
                static_cast<uint8_t>((val >> 8) & 0xFF)
              };

        # Max Discharge Current (2 bytes: uint16_t in A)
        - id: bms${bms_id}_ble_max_discharge_current
          uuid: "beb5483e-36e1-4688-b7f5-ea07361b260d"
