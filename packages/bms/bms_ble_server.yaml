# +--------------------------------------+
# | BLE Server Configuration             |
# +--------------------------------------+
# This file configures a BLE GATT server to expose BMS data
# as an alternative to Modbus communication.
#
# Service UUID: Custom YamBMS BMS Service
# Each BMS data point is exposed as a characteristic with notify support.
#
# Required substitutions:
#   bms_id: The BMS ID number
#   ble_service_uuid: The service UUID (default provided)
#   ble_notify_interval: Interval for notify updates (default: 1s)

substitutions:
  # YamBMS BMS Service UUID (base UUID for the service)
  # You can customize this per BMS if needed
  ble_service_uuid: "4fafc201-1fb5-459e-8fcc-c5c9c331914b"
  ble_notify_interval: "1s"

esp32_ble_server:
  manufacturer: "YamBMS"
  model: "BMS ${bms_id}"
  services:
    - uuid: ${ble_service_uuid}
      advertise: true
      characteristics:
        # Characteristic 1: Online Status (1 byte: 0/1)
        - id: bms${bms_id}_ble_online_status
          uuid: "beb5483e-36e1-4688-b7f5-ea07361b2601"
          description: "Online Status"
          read: true
          notify: true
          value:
            data: !lambda |-
              return std::vector<uint8_t>{static_cast<uint8_t>(id(bms${bms_id}_online_status).state ? 1 : 0)};

        # Characteristic 2: Charging Allowed (1 byte: 0/1)
        - id: bms${bms_id}_ble_charging_allowed
          uuid: "beb5483e-36e1-4688-b7f5-ea07361b2602"
          description: "Charging Allowed"
          read: true
          notify: true
          value:
            data: !lambda |-
              return std::vector<uint8_t>{static_cast<uint8_t>(id(bms${bms_id}_charging_allowed).state ? 1 : 0)};

        # Characteristic 3: Discharging Allowed (1 byte: 0/1)
        - id: bms${bms_id}_ble_discharging_allowed
          uuid: "beb5483e-36e1-4688-b7f5-ea07361b2603"
          description: "Discharging Allowed"
          read: true
          notify: true
          value:
            data: !lambda |-
              return std::vector<uint8_t>{static_cast<uint8_t>(id(bms${bms_id}_discharging_allowed).state ? 1 : 0)};

        # Characteristic 4: Equalizing/Balancing (1 byte: 0/1)
        - id: bms${bms_id}_ble_equalizing
          uuid: "beb5483e-36e1-4688-b7f5-ea07361b2604"
          description: "Equalizing"
          read: true
          notify: true
          value:
            data: !lambda |-
              return std::vector<uint8_t>{static_cast<uint8_t>(id(bms${bms_id}_equalizing).state ? 1 : 0)};

        # Characteristic 5: Total Voltage (4 bytes: uint32_t in mV)
        - id: bms${bms_id}_ble_total_voltage
          uuid: "beb5483e-36e1-4688-b7f5-ea07361b2605"
          description: "Total Voltage mV"
          read: true
          notify: true
          value:
            data: !lambda |-
              float state = id(bms${bms_id}_total_voltage).state;
              uint32_t val = std::isnan(state) ? 0 : static_cast<uint32_t>(state * 1000);
              return std::vector<uint8_t>{
                static_cast<uint8_t>(val & 0xFF),
                static_cast<uint8_t>((val >> 8) & 0xFF),
                static_cast<uint8_t>((val >> 16) & 0xFF),
                static_cast<uint8_t>((val >> 24) & 0xFF)
              };

        # Characteristic 6: Current (4 bytes: int32_t in mA, signed)
        - id: bms${bms_id}_ble_current
          uuid: "beb5483e-36e1-4688-b7f5-ea07361b2606"
          description: "Current mA"
          read: true
          notify: true
          value:
            data: !lambda |-
              float state = id(bms${bms_id}_current).state;
              int32_t val = std::isnan(state) ? 0 : static_cast<int32_t>(state * 1000);
              return std::vector<uint8_t>{
                static_cast<uint8_t>(val & 0xFF),
                static_cast<uint8_t>((val >> 8) & 0xFF),
                static_cast<uint8_t>((val >> 16) & 0xFF),
                static_cast<uint8_t>((val >> 24) & 0xFF)
              };

        # Characteristic 7: Power (4 bytes: int32_t in mW, signed)
