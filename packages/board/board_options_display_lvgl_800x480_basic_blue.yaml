sensor:

  # ── PAGE 1 - BATTERY ──

  - platform: template
    id: !extend ${yambms_id}_total_voltage
    on_value:
      then:
      - lvgl.label.update:
          id: lbl_voltage
          text: !lambda 'char buf[16]; snprintf(buf, 16, "%.1f V", x); return buf;'

  - platform: template
    id: !extend ${yambms_id}_current
