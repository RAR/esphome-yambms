binary_sensor:
  - platform: template
    id: !extend ${yambms_id}_equalizing
    on_state:
      then:
      - lvgl.label.update:
          id: lbl_equalizing
          text: !lambda 'return std::string("Equalizing: ") + (x ? "ON" : "OFF");'
          text_color: !lambda 'return x ? lv_color_hex(0xfdcb6e) : lv_color_hex(0xb2bec3);'

  - platform: template
    id: !extend inverter_com_status
    on_state:
      then:
      - lvgl.label.update:
          id: lbl_inv_comm
          text: !lambda 'return std::string(x ? "ONLINE" : "OFFLINE");'
          text_color: !lambda 'return x ? lv_color_hex(0x00b894) : lv_color_hex(0xe17055);'

  - platform: status
    id: !extend esp32_online_status
    on_state:
      then:
      - lvgl.label.update:
          id: lbl_board_status
          text: !lambda 'return std::string(x ? "ONLINE" : "OFFLINE");'
          text_color: !lambda 'return x ? lv_color_hex(0x00b894) : lv_color_hex(0xe17055);'

  - platform: template
    id: !extend ${yambms_id}_discharging_instruction
