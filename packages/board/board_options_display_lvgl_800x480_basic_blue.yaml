# Board  : ESP32-S3 WS Touch LCD 7" and 4.3" (800x480)
# Pages  : Page 1 = Battery | Page 2 = Status

# +---------------------------------------------------------+
# | Fonts                                                   |
# +---------------------------------------------------------+
font:
  - file: "gfonts://Montserrat"
    id: font_14
    size: 14
    bpp: 4
  - file: "gfonts://Montserrat"
    id: font_18
    size: 18
    bpp: 4
    glyphs: "!\"%&'()*+,-./0123456789:;<=>?@ABCDEFGHIJKLMNOPQRSTUVWXYZ[\\]^_`abcdefghijklmnopqrstuvwxyz{|}~ °↑↓"
  - file: "gfonts://Montserrat"
    id: font_22
    size: 22
    bpp: 4
  - file: "gfonts://Montserrat"
    id: font_28
    size: 28
    bpp: 4
  - file: "gfonts://Montserrat"
    id: font_40
    size: 40
    bpp: 4

# +---------------------------------------------------------+
# | Display Timeout                                         |
# +---------------------------------------------------------+
number:
  - platform: template
    id: display_timeout
    device_id: ${board_id}
    name: "Display timeout"
    optimistic: true
    unit_of_measurement: "s"
    initial_value: 300
    restore_value: true
    min_value: 5
    max_value: 300
    step: 5
    mode: box
    entity_category: config

# +---------------------------------------------------------+
# | Touch Screen actions                                    |
# +---------------------------------------------------------+

touchscreen:
  - platform: gt911
    id: !extend my_touchscreen
    on_release: # when the finger leaves the screen surface
      - if:
          condition: lvgl.is_paused
          then:
            - lvgl.resume:
            - lvgl.widget.redraw:
            - light.turn_on: backlight

# +---------------------------------------------------------+
# | LVGL Configuration                                      |
# +---------------------------------------------------------+
# | Color definitions (LVGL hex)                            |
# +---------------------------------------------------------+
# BG         : 0x1a1a2e  (dark navy)
# PANEL      : 0x16213e  (slightly lighter navy)
# ACCENT     : 0x0f3460  (blue)
# GREEN      : 0x00b894
# YELLOW     : 0xfdcb6e
# RED        : 0xe17055
# TEXT_WHITE : 0xffffff
# TEXT_GRAY  : 0xb2bec3

lvgl:
  displays:
    - my_display
  touchscreens:
    - my_touchscreen

  on_idle:
    timeout: !lambda "return (id(display_timeout).state * 1000);"
    then:
      - light.turn_off: backlight
      - lvgl.pause:

  # Global style defaults
  theme:
    label:
      text_color: 0xffffff
    obj:
      pad_all: 0
      scrollbar_mode: "off"

