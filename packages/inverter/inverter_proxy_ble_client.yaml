# Status flags as binary sensors
# Note: We'll extract these from the status characteristic in a lambda
globals:
  - id: ${proxy_id}_status_flags
    type: uint32_t
    initial_value: '0'
  - id: ${proxy_id}_alarm_flags
    type: uint32_t
    initial_value: '0'

sensor:
  # Status flags characteristic (will be parsed into binary sensors)
  - platform: ble_client
    type: characteristic
    ble_client_id: ${proxy_id}_ble_client
    id: ${proxy_id}_status_raw
    internal: true
    service_uuid: ${ble_service_status_uuid}
    characteristic_uuid: '00000401-ba5e-f4ee-5ca1-eb1e5e4b1ce0'
    notify: true
    lambda: |-
      if (x.size() < 4) return {};
      uint32_t val;
      memcpy(&val, &x[0], 4);
      id(${proxy_id}_status_flags) = val;
      return {};
  
  # Alarm flags characteristic
  - platform: ble_client
    type: characteristic
    ble_client_id: ${proxy_id}_ble_client
    id: ${proxy_id}_alarm_raw
    internal: true
    service_uuid: ${ble_service_status_uuid}
    characteristic_uuid: '00000402-ba5e-f4ee-5ca1-eb1e5e4b1ce0'
    notify: true
    lambda: |-
      if (x.size() < 4) return {};
      uint32_t val;
      memcpy(&val, &x[0], 4);
      id(${proxy_id}_alarm_flags) = val;
      return {};

# Status binary sensors (extracted from flags)
binary_sensor:
  - platform: template
    name: "${proxy_id} Charging"
    id: ${proxy_id}_charging
    lambda: |-
      return (id(${proxy_id}_status_flags) & (1 << 0)) != 0;
  
  - platform: template
    name: "${proxy_id} Charge FET"
    id: ${proxy_id}_charge_fet
    lambda: |-
      return (id(${proxy_id}_status_flags) & (1 << 1)) != 0;
  
  - platform: template
    name: "${proxy_id} Discharge FET"
    id: ${proxy_id}_discharge_fet
    lambda: |-
      return (id(${proxy_id}_status_flags) & (1 << 2)) != 0;
  
  - platform: template
    name: "${proxy_id} Balancing"
    id: ${proxy_id}_balancing
    lambda: |-
      return (id(${proxy_id}_status_flags) & (1 << 3)) != 0;
  
  # Alarm binary sensors
  - platform: template
    name: "${proxy_id} Cell Overvoltage"
    id: ${proxy_id}_cell_overvoltage
    lambda: |-
      return (id(${proxy_id}_alarm_flags) & (1 << 0)) != 0;
  
  - platform: template
    name: "${proxy_id} Cell Undervoltage"
    id: ${proxy_id}_cell_undervoltage
    lambda: |-
      return (id(${proxy_id}_alarm_flags) & (1 << 1)) != 0;
  
  - platform: template
    name: "${proxy_id} Temperature High"
    id: ${proxy_id}_temperature_high
    lambda: |-
      return (id(${proxy_id}_alarm_flags) & (1 << 2)) != 0;
  
  - platform: template
    name: "${proxy_id} Temperature Low"
    id: ${proxy_id}_temperature_low
    lambda: |-
      return (id(${proxy_id}_alarm_flags) & (1 << 3)) != 0;
  
  - platform: template
    name: "${proxy_id} Charge Overcurrent"
    id: ${proxy_id}_charge_overcurrent
    lambda: |-
      return (id(${proxy_id}_alarm_flags) & (1 << 4)) != 0;
  
  - platform: template
    name: "${proxy_id} Discharge Overcurrent"
    id: ${proxy_id}_discharge_overcurrent
    lambda: |-
      return (id(${proxy_id}_alarm_flags) & (1 << 5)) != 0;

# Update template sensors periodically
interval:
  - interval: 1s
    then:
      - component.update: ${proxy_id}_charging
      - component.update: ${proxy_id}_charge_fet
      - component.update: ${proxy_id}_discharge_fet
      - component.update: ${proxy_id}_balancing
      - component.update: ${proxy_id}_cell_overvoltage
      - component.update: ${proxy_id}_cell_undervoltage
      - component.update: ${proxy_id}_temperature_high
      - component.update: ${proxy_id}_temperature_low
      - component.update: ${proxy_id}_charge_overcurrent
      - component.update: ${proxy_id}_discharge_overcurrent
