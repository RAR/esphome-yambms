# +--------------------------------------+
# | Inverter Proxy CAN Output            |
# +--------------------------------------+
# Outputs CAN frames to inverter using BLE-sourced battery data
# Supports PYLON, SMA, Victron, LuxPower protocols
#
# Variables required:
# ${proxy_id} - ID of the BLE client proxy (must match inverter_proxy_ble_client.yaml)
# ${canbus_node_id} - CAN bus node ID (e.g., 'canbus_inverter_1')
# ${proxy_name} - Display name for this proxy

# This package extends the standard yambms_canbus.yaml functionality
# but reads from BLE proxy sensors instead of YamBMS combined sensors

substitutions:
  proxy_canbus_link_timer: '5s'

globals:
  - id: ${proxy_id}_can_send_data
    type: bool
    restore_value: no
    initial_value: "false"
  - id: ${proxy_id}_can_frame
    type: int
    restore_value: no
    initial_value: "0"
  - id: ${proxy_id}_can_frame_index
    type: int
    restore_value: no
    initial_value: "-1"

select:
  - platform: template
    name: "${proxy_name} Protocol"
    id: ${proxy_id}_protocol
    options:
      - "Disabled"
      - "PYLON 1.2"
      - "PYLON V2"
      - "SMA"
      - "Victron"
      - "LuxPower"
    restore_value: true
    initial_option: "PYLON V2"
    optimistic: true
    entity_category: config

binary_sensor:
  - platform: template
    id: ${proxy_id}_can_status
    name: "${proxy_name} CAN Status"
    entity_category: diagnostic

script:
  - id: ${proxy_id}_can_link_timer
    mode: restart
    then:
      - delay: ${proxy_canbus_link_timer}
      - lambda: |-
          id(${proxy_id}_can_send_data) = false;
          id(${proxy_id}_can_status).publish_state(false);

canbus:
  # Listen for inverter ACK
  - id: !extend ${canbus_node_id}
    on_frame:
      - can_id: 0x305
        then:
          - lambda: |-
              id(${proxy_id}_can_link_timer).execute();
              if (id(${proxy_id}_can_status).state == false) {
                id(${proxy_id}_can_send_data) = true;
                id(${proxy_id}_can_status).publish_state(true);
              }

interval:
  # Test connection periodically
  - interval: 30s
    then:
      - lambda: |-
          if (id(${proxy_id}_can_send_data) == false && id(${proxy_id}_ble_connected).state) {
            id(${proxy_id}_can_send_data) = true;
            id(${proxy_id}_can_link_timer).execute();
            ESP_LOGD("proxy", "CAN bus starting...");
          }
  
  # Send CAN frames
  - interval: 100ms
    then:
      - if:
          condition:
            lambda: |-
              // Only send if BLE connected and CAN enabled
              if (!id(${proxy_id}_ble_connected).state) return false;
              if (!id(${proxy_id}_can_send_data)) return false;
              if (id(${proxy_id}_protocol).active_index() == 0) return false; // Disabled
              
              int index = id(${proxy_id}_can_frame_index);
              
              // PYLON 1.2 / LuxPower
              if ((id(${proxy_id}_protocol).active_index() == 1) || (id(${proxy_id}_protocol).active_index() == 5)) {
                int can_frame[] = {1, 2, 3, 4, 5, 6};
                index = (index >= 5) ? 0 : index + 1;
                id(${proxy_id}_can_frame) = can_frame[index];
              }
              // PYLON V2
              else if (id(${proxy_id}_protocol).active_index() == 2) {
                int can_frame[] = {1, 2, 3, 4, 5, 6, 7};
                index = (index >= 6) ? 0 : index + 1;
                id(${proxy_id}_can_frame) = can_frame[index];
              }
              // SMA
              else if (id(${proxy_id}_protocol).active_index() == 3) {
                int can_frame[] = {1, 2, 3, 4, 7, 8};
                index = (index >= 5) ? 0 : index + 1;
                id(${proxy_id}_can_frame) = can_frame[index];
              }
              // Victron
              else if (id(${proxy_id}_protocol).active_index() == 4) {
                int can_frame[] = {1, 2, 3, 4, 7, 8};
                index = (index >= 5) ? 0 : index + 1;
                id(${proxy_id}_can_frame) = can_frame[index];
              }
              
              id(${proxy_id}_can_frame_index) = index;
              return true;
          then:
            # Frame 1: Manufacturer name (0x35E)
            - if:
                condition:
                  lambda: return id(${proxy_id}_can_frame) == 1;
                then:
                  - canbus.send:
                      canbus_id: ${canbus_node_id}
                      can_id: 0x35E
                      data: [0x50, 0x59, 0x4C, 0x4F, 0x4E, 0x20, 0x20, 0x20] # "PYLON   "
            
            # Frame 2: Battery voltage + current (0x356)
            - if:
                condition:
                  lambda: return id(${proxy_id}_can_frame) == 2;
                then:
                  - canbus.send:
                      canbus_id: ${canbus_node_id}
                      can_id: 0x356
                      data: !lambda |-
                        float voltage = id(${proxy_id}_voltage).state;
                        float current = id(${proxy_id}_current).state;
                        int16_t voltage_int = (int16_t)(voltage * 100.0f);
                        int16_t current_int = (int16_t)(current * 10.0f);
                        return {
                          (uint8_t)(voltage_int & 0xFF),
                          (uint8_t)((voltage_int >> 8) & 0xFF),
                          (uint8_t)(current_int & 0xFF),
                          (uint8_t)((current_int >> 8) & 0xFF),
                          0x00, 0x00, 0x00, 0x00
                        };
            
            # Frame 3: SOC + SOH (0x355)
            - if:
                condition:
                  lambda: return id(${proxy_id}_can_frame) == 3;
                then:
                  - canbus.send:
                      canbus_id: ${canbus_node_id}
                      can_id: 0x355
                      data: !lambda |-
                        uint16_t soc = (uint16_t)id(${proxy_id}_soc).state;
                        uint16_t soh = (uint16_t)id(${proxy_id}_soh).state;
                        return {
                          (uint8_t)(soc & 0xFF),
                          (uint8_t)((soc >> 8) & 0xFF),
                          (uint8_t)(soh & 0xFF),
                          (uint8_t)((soh >> 8) & 0xFF),
                          0x00, 0x00, 0x00, 0x00
                        };
            
            # Frame 4: Charge/discharge limits (0x351)
            - if:
                condition:
                  lambda: return id(${proxy_id}_can_frame) == 4;
                then:
                  - canbus.send:
                      canbus_id: ${canbus_node_id}
                      can_id: 0x351
                      data: !lambda |-
                        float charge_v = id(${proxy_id}_charge_voltage).state;
                        float discharge_v = id(${proxy_id}_discharge_voltage).state;
                        float charge_a = id(${proxy_id}_max_charge_current).state;
                        float discharge_a = id(${proxy_id}_max_discharge_current).state;
                        
                        int16_t charge_v_int = (int16_t)(charge_v * 10.0f);
                        int16_t charge_a_int = (int16_t)(charge_a * 10.0f);
                        int16_t discharge_v_int = (int16_t)(discharge_v * 10.0f);
                        int16_t discharge_a_int = (int16_t)(discharge_a * 10.0f);
                        
                        return {
                          (uint8_t)(charge_v_int & 0xFF),
                          (uint8_t)((charge_v_int >> 8) & 0xFF),
                          (uint8_t)(charge_a_int & 0xFF),
                          (uint8_t)((charge_a_int >> 8) & 0xFF),
                          (uint8_t)(discharge_v_int & 0xFF),
                          (uint8_t)((discharge_v_int >> 8) & 0xFF),
                          (uint8_t)(discharge_a_int & 0xFF),
                          (uint8_t)((discharge_a_int >> 8) & 0xFF)
                        };
            
            # Frame 5: Alarms/warnings (0x359)
            - if:
                condition:
                  lambda: return id(${proxy_id}_can_frame) == 5;
                then:
                  - canbus.send:
                      canbus_id: ${canbus_node_id}
                      can_id: 0x359
                      data: !lambda |-
                        uint8_t alarm1 = 0;
                        uint8_t alarm2 = 0;
                        uint8_t warn1 = 0;
                        uint8_t warn2 = 0;
                        
                        // Alarms
                        if (id(${proxy_id}_cell_overvoltage).state) alarm1 |= 0x04;
                        if (id(${proxy_id}_cell_undervoltage).state) alarm1 |= 0x08;
                        if (id(${proxy_id}_charge_overcurrent).state) alarm1 |= 0x02;
                        if (id(${proxy_id}_discharge_overcurrent).state) alarm1 |= 0x01;
                        if (id(${proxy_id}_temperature_high).state) alarm2 |= 0x01;
                        if (id(${proxy_id}_temperature_low).state) alarm2 |= 0x02;
                        
                        return {alarm1, alarm2, warn1, warn2, 0x00, 0x00, 0x00, 0x00};
            
            # Frame 6: Battery status (0x35A)
            - if:
                condition:
                  lambda: return id(${proxy_id}_can_frame) == 6;
                then:
                  - canbus.send:
                      canbus_id: ${canbus_node_id}
                      can_id: 0x35A
                      data: !lambda |-
                        uint8_t status = 0x00;
                        // Bit 0-3: number of modules (0-15)
                        status |= 0x01;
                        // Bit 4-7: status flags
                        if (id(${proxy_id}_charge_fet).state && id(${proxy_id}_discharge_fet).state) {
                          status |= 0x80; // Both FETs on = ready
                        }
                        return {status, 0x00, 0x00, 0x00, 0x00, 0x00, 0x00, 0x00};
            
            # Frame 7: Cell voltages (0x373 for Victron/PYLON V2)
            - if:
                condition:
                  lambda: return id(${proxy_id}_can_frame) == 7;
                then:
                  - canbus.send:
                      canbus_id: ${canbus_node_id}
                      can_id: 0x373
                      data: !lambda |-
                        float cell_min = id(${proxy_id}_min_cell_voltage).state;
                        float cell_max = id(${proxy_id}_max_cell_voltage).state;
                        int16_t min_mv = (int16_t)(cell_min * 1000.0f);
                        int16_t max_mv = (int16_t)(cell_max * 1000.0f);
                        return {
                          (uint8_t)(min_mv & 0xFF),
                          (uint8_t)((min_mv >> 8) & 0xFF),
                          (uint8_t)(max_mv & 0xFF),
                          (uint8_t)((max_mv >> 8) & 0xFF),
                          0x00, 0x00, 0x00, 0x00
                        };
            
            # Frame 8: Temperatures (0x374 for SMA/Victron)
            - if:
                condition:
                  lambda: return id(${proxy_id}_can_frame) == 8;
                then:
                  - canbus.send:
                      canbus_id: ${canbus_node_id}
                      can_id: 0x374
                      data: !lambda |-
                        float temp_min = id(${proxy_id}_min_temperature).state;
                        float temp_max = id(${proxy_id}_max_temperature).state;
                        int16_t min_temp = (int16_t)(temp_min * 10.0f);
                        int16_t max_temp = (int16_t)(temp_max * 10.0f);
                        return {
                          (uint8_t)(min_temp & 0xFF),
                          (uint8_t)((min_temp >> 8) & 0xFF),
                          (uint8_t)(max_temp & 0xFF),
                          (uint8_t)((max_temp >> 8) & 0xFF),
                          0x00, 0x00, 0x00, 0x00
                        };
