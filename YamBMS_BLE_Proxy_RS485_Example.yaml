# +--------------------------------------+
# | BLE Inverter Proxy - RS485 Example   |
# +--------------------------------------+
# Node B: BLE Client → RS485 output
# Connects to YamBMS BLE server and outputs to inverter via RS485

esphome:
  name: inverter-proxy-rs485
  friendly_name: "Inverter Proxy RS485"

esp32:
  board: esp32dev
  framework:
    type: arduino

# Enable logging
logger:
  level: INFO
  # Disable logging on UART1 if using it for RS485
  baud_rate: 0

# Enable Home Assistant API
api:
  encryption:
    key: !secret api_key

ota:
  - platform: esphome
    password: !secret ota_password

wifi:
  ssid: !secret wifi_ssid
  password: !secret wifi_password

# +--------------------------------------+
# | Proxy Configuration                  |
# +--------------------------------------+
substitutions:
  friendly_name: 'Inverter Proxy RS485'
  hostname: 'inverter-proxy-rs485'
  proxy_id: 'inv_proxy'
  proxy_name: 'Inverter Proxy'
  proxy_uart_id: 'uart_1'
  
  # BLE Server MAC address (Node A)
  # Get this from Node A logs after first boot
  # Format: XX:XX:XX:XX:XX:XX
  yambms_server_mac: 'AA:BB:CC:DD:EE:FF'  # Change this!

packages:
  # Board configuration
  board:
    url: https://github.com/RAR/esphome-yambms
    ref: ble-inverter-proxy
    refresh: 0s
    files:
      - path: 'packages/board/board_ESP32_Generic.yaml'
  
  # BLE Client - connect to YamBMS server
  ble_client:
    url: https://github.com/RAR/esphome-yambms
    ref: ble-inverter-proxy
    refresh: 0s
    files:
      - path: 'packages/inverter/inverter_proxy_ble_client.yaml'
  
  # RS485 output to inverter
  rs485_output:
    url: https://github.com/RAR/esphome-yambms
    ref: ble-inverter-proxy
    refresh: 0s
    files:
      - path: 'packages/inverter/inverter_proxy_rs485.yaml'

# +--------------------------------------+
# | UART Configuration                   |
# +--------------------------------------+
uart:
  - id: uart_1
    tx_pin: GPIO17
    rx_pin: GPIO16
    baud_rate: 115200

# +--------------------------------------+
# | Protocol Selection                   |
# +--------------------------------------+
# Available protocols: PYLON, SMA (SMA not yet implemented)
# Default is configured in inverter_proxy_rs485.yaml
# Override here if needed:
#
# select:
#   - id: !extend inv_proxy_rs485_protocol
#     initial_option: "PYLON"

# +--------------------------------------+
# | Status LEDs (optional)               |
# +--------------------------------------+
light:
  - platform: status_led
    id: status_led
    pin: GPIO2
    name: "Status LED"

# +--------------------------------------+
# | Setup Instructions                   |
# +--------------------------------------+
# 1. Flash Node A (YamBMS Server) first
# 2. Check Node A logs for BLE MAC address
# 3. Update yambms_server_mac above with Node A MAC
# 4. Flash this Node B
# 5. Node B will auto-connect to Node A
# 6. Connect RS485 TX/RX pins to inverter
#    - TX: GPIO17 → RS485 A/+
#    - RX: GPIO16 → RS485 B/-
#    - Common GND connection required
# 7. Inverter must support Pylon protocol (RS485)
# 8. Monitor logs for connection status
# 
# Wiring Note:
# - Most inverters need RS485 A/B (differential signaling)
# - Use MAX485 or similar RS485 transceiver module
# - Connect ESP32 UART → MAX485 → Inverter
