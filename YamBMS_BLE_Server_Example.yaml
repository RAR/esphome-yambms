# +--------------------------------------+
# | YamBMS BLE Server Example            |
# +--------------------------------------+
# Node A: Main YamBMS with BLE server
# Exposes combined YamBMS data via BLE for wireless inverter proxy

esphome:
  name: yambms-server
  friendly_name: "YamBMS Server"

esp32:
  board: esp32dev
  framework:
    type: arduino

# Enable logging
logger:
  level: INFO

# Enable Home Assistant API
api:
  encryption:
    key: !secret api_key

ota:
  - platform: esphome
    password: !secret ota_password

wifi:
  ssid: !secret wifi_ssid
  password: !secret wifi_password

# +--------------------------------------+
# | YamBMS Configuration                 |
# +--------------------------------------+
substitutions:
  friendly_name: 'YamBMS Server'
  hostname: 'yambms-server'
  yambms_id: 'yambms1'
  yambms_name: 'YamBMS 1'
  yambms_update_interval: '1s'
  yambms_battery_chemistry: '1' # LFP
  yambms_cell_count: '16'
  yambms_bulk_v: '57'
  yambms_float_v: '55.5'
  yambms_rebulk_v: '53'
  yambms_eoc_timer: '30'
  yambms_cutoff_timer: '60'
  yambms_max_requested_charge_current: '275'
  yambms_max_requested_discharge_current: '275'
  bms_update_interval: '5s'
  bms_combine_interval: '2s'
  bms_cutoff_timer: '50s'

packages:
  # Board configuration
  board:
    url: https://github.com/Sleeper85/esphome-yambms
    ref: dev
    refresh: 0s
    files:
      - path: 'packages/board/board_ESP32_Generic.yaml'
  
  # YamBMS core
  yambms:
    url: https://github.com/Sleeper85/esphome-yambms
    ref: dev
    refresh: 0s
    files:
      - path: 'packages/yambms/yambms.yaml'
  
  # BMS connections (example with JK-BMS via Modbus)
  bms:
    url: https://github.com/Sleeper85/esphome-yambms
    ref: dev
    refresh: 0s
    files:
      - path: 'packages/board/board_options_itf_uart_esp_1.yaml'
      - path: 'packages/board/board_options_itf_modbus.yaml'
        vars:
          modbus_role: 'client'
          modbus_uart_id: 'uart_esp_1'
      - path: 'packages/bms/bms_combine_modbus_client.yaml'
        vars:
          bms_id: '1'
          bms_name: 'JK-BMS 1'
  
  # BLE Server - expose YamBMS data
  ble_server:
    url: https://github.com/RAR/esphome-yambms
    ref: ble-inverter-proxy
    refresh: 0s
    files:
      - path: 'packages/yambms/yambms_ble_server.yaml'

# Note: After flashing, check ESP32 MAC address for BLE connection
# It will be displayed in logs during boot
